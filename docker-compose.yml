services:
  api:
    build: ./api
    env_file: .env
    restart: unless-stopped
    networks:
      - adipa-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - adipa-net
    depends_on:
      api:
        condition: service_started

networks:
  adipa-net:
